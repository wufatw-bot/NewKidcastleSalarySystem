<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Kidcastle 薪資資料遷移工具 (11504/11505)</title>
<style>
  body{font-family:"Microsoft JhengHei",sans-serif;max-width:780px;margin:24px auto;padding:0 20px;color:#1e293b;background:#f1f5f9;line-height:1.7}
  h1{color:#1e40af;border-bottom:3px solid #3b82f6;padding-bottom:8px;font-size:22px}
  h2{color:#475569;font-size:16px;margin-top:24px;border-left:4px solid #3b82f6;padding-left:10px}
  .card{background:#fff;border-radius:12px;padding:18px 22px;margin:14px 0;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  button{background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:#fff;border:none;padding:12px 24px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin:6px 8px 6px 0;transition:transform .1s}
  button:hover{transform:translateY(-1px)}
  button:disabled{opacity:.5;cursor:not-allowed}
  button.danger{background:linear-gradient(135deg,#DC2626,#991B1B)}
  pre{background:#0f172a;color:#e2e8f0;padding:14px;border-radius:8px;font-size:12px;max-height:300px;overflow:auto;line-height:1.5}
  .ok{color:#166534;background:#dcfce7;padding:8px 12px;border-radius:6px;font-weight:600}
  .err{color:#991B1B;background:#fee2e2;padding:8px 12px;border-radius:6px;font-weight:600}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:6px 10px;border-bottom:1px solid #e2e8f0;text-align:left}
  th{background:#dbeafe;color:#1e40af;font-weight:700}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;margin-left:6px}
  .badge.upd{background:#fef3c7;color:#92400e}
  .badge.new{background:#dcfce7;color:#166534}
  .badge.same{background:#f1f5f9;color:#64748b}
</style>
</head>
<body>
<h1>☁ Kidcastle 薪資資料遷移工具</h1>
<div class="card">
  <p>此工具會根據 <b>同安薪資11407起.xlsx</b> 與 <b>莊敬薪資11407起.xlsx</b> 的內容，將解析後的「結構性薪資」（底薪/全勤/年資/各種津貼/勞健保）寫到雲端 (Google Drive)，並把當月份的一次性獎金/請假寫到 salary[11504] / salary[11505]。</p>
  <p><b>步驟：</b></p>
  <ol>
    <li>點「① 從雲端讀取」確認連線正常</li>
    <li>點「② 預覽變更」檢視差異</li>
    <li>確認無誤後，點「③ 寫入雲端」</li>
  </ol>
</div>

<div class="card">
  <button onclick="loadCloud()">① 從雲端讀取</button>
  <button onclick="preview()" id="bPrev" disabled>② 預覽變更</button>
  <button onclick="apply()" id="bApply" disabled class="danger">③ 寫入雲端</button>
  <span id="status"></span>
</div>

<div class="card">
  <h2>結果 / 訊息</h2>
  <div id="msg"></div>
</div>

<script>
const URL = 'https://script.google.com/macros/s/AKfycbyQpJuII2RkmYQ-3P33XMt_Vv8Fd9eAV8KmwnHiTOQiXZuL3E9yvIBBiMRNgxEBKpU/exec';

// === Parsed structural salary from Excel (一次性手動審閱) ===
const TA = {
  '陳明霞': {struct:{'底薪':31500,'全勤獎金':500,'年資津貼':4000,'分校人數超額獎金':5500,'混班/混校津貼':500,'勞保自付':2620,'退休金提撥':1998}, bonus:1200, leave:0},
  '廖月櫻': {struct:{'底薪':31500,'全勤獎金':500,'主管津貼':6000,'分校人數超額獎金':7500,'美語津貼':12600,'混班/混校津貼':4000,'勞保自付':1349}, bonus:0, leave:594},
  '鄭錦雪': {struct:{'底薪':31500,'全勤獎金':500,'年資津貼':4000,'分校人數超額獎金':6500,'勞保自付':2620,'退休金提撥':1998}, bonus:1800, leave:0},
  '翁麗美': {struct:{'底薪':31500,'全勤獎金':500,'年資津貼':4000,'分校人數超額獎金':2000,'混班/混校津貼':5500,'勞保自付':1698}, bonus:1000, leave:0},
  '郭子綺': {struct:{'底薪':31500,'全勤獎金':500,'年資津貼':4000,'分校人數超額獎金':0,'勞保自付':458}, bonus:0, leave:0},
  '林錦雲': {struct:{'底薪':29500,'全勤獎金':500,'年資津貼':2000}, bonus:30280, leave:0},
  '陳渝潔': {struct:{'底薪':31500,'全勤獎金':500,'年資津貼':3000,'分校人數超額獎金':1500,'勞保自付':1196}, bonus:1100, leave:0},
  '吳鈺蘋': {struct:{'底薪':30500,'全勤獎金':0,'年資津貼':2000,'英文輔導津貼':6000,'勞保自付':1196}, bonus:3500, leave:1920},
  '陳允謙': {struct:{'底薪':31500,'全勤獎金':500,'年資津貼':2000,'英文輔導津貼':6000,'勞保自付':1196}, bonus:5200, leave:1920},
  '陳敬翔': {struct:{'底薪':31500,'全勤獎金':500,'年資津貼':2000,'分校人數超額獎金':1500,'混班/混校津貼':500,'勞保自付':1196}, bonus:2300, leave:0},
  '陳正芬': {struct:{'底薪':31500,'全勤獎金':500,'主管津貼':4000,'分校人數超額獎金':11500,'帶班人數津貼':10500,'混班/混校津貼':500,'數學班津貼':400,'勞保自付':1349,'退休金提撥':1998}, bonus:800, leave:0},
  '宋家喬': {struct:{'底薪':31500,'全勤獎金':500,'年資津貼':3000,'分校人數超額獎金':2000,'數學班津貼':100,'勞保自付':2384,'退休金提撥':1818}, bonus:1300, leave:1440},
};
const ZJ = {
  '李如蘋': {struct:{'底薪':29500,'全勤獎金':500,'年資津貼':4000,'分校人數超額獎金':1600,'美語津貼':1300,'勞保自付':2620,'退休金提撥':1998}, bonus:1000, leave:0},
  '蕭羽儂': {struct:{'底薪':31500,'全勤獎金':500,'主管津貼':10000,'分校人數超額獎金':5000,'其他津貼':3000,'勞保自付':2782}, bonus:0, leave:0},
  '黃玉華': {struct:{'底薪':30500,'全勤獎金':500,'年資津貼':4000,'主管津貼':7000,'分校人數超額獎金':10240,'帶班人數津貼':11500,'混班/混校津貼':500,'其他津貼':3500,'勞保自付':1349}, bonus:600, leave:0},
  '洪子彤': {struct:{'底薪':30500,'全勤獎金':500,'年資津貼':4000,'分校人數超額獎金':500,'英文輔導津貼':3000,'其他津貼':3000,'勞保自付':1196}, bonus:1000, leave:0},
  '吳湘晴': {struct:{'底薪':30500,'全勤獎金':500,'年資津貼':4000,'分校人數超額獎金':1500,'勞保自付':1654}, bonus:1200, leave:0},
  '胡瑄曼': {struct:{'底薪':29500,'全勤獎金':1500,'年資津貼':2000,'分校人數超額獎金':0,'勞保自付':2570}, bonus:0, leave:0},
  '蕭文華': {struct:{'底薪':29500,'全勤獎金':0,'其他津貼':29140}, bonus:1000, leave:0},
  '游晏慈': {struct:{'底薪':29500,'全勤獎金':1500,'年資津貼':1000,'分校人數超額獎金':0,'英文輔導津貼':3000,'其他津貼':4000,'勞保自付':1196}, bonus:200, leave:0},
  '何宥蓉': {struct:{'底薪':29500,'全勤獎金':1500,'年資津貼':1000,'勞保自付':1196}, bonus:0, leave:0},
  '何革融': {struct:{'底薪':29500,'全勤獎金':1500,'年資津貼':1000,'分校人數超額獎金':0,'勞保自付':1196}, bonus:400, leave:0},
};

let cloudData = null;

function setStatus(msg, cls) {
  document.getElementById('status').innerHTML = '<span class="'+(cls||'')+'">'+msg+'</span>';
}
function setMsg(html) {
  document.getElementById('msg').innerHTML = html;
}

async function loadCloud() {
  setStatus('讀取中...');
  try {
    const r = await fetch(URL + '?action=read&_=' + Date.now(), {cache:'no-store'});
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || '雲端錯誤');
    cloudData = j.data;
    setStatus('✓ 已讀取', 'ok');
    document.getElementById('bPrev').disabled = false;
    setMsg('<p>雲端目前有 <b>'+cloudData.employees.length+'</b> 位員工、<b>'+cloudData.salary.length+'</b> 筆月薪資紀錄</p>');
  } catch (e) {
    setStatus('✗ '+e.message, 'err');
  }
}

function getUpdates() {
  const out = [];
  const allParsed = {...TA, ...ZJ};
  const campus = (nm) => TA[nm] ? '同安' : (ZJ[nm] ? '莊敬' : null);
  const month = (nm) => TA[nm] ? '11504' : (ZJ[nm] ? '11505' : null);
  for (const [nm, info] of Object.entries(allParsed)) {
    const emp = cloudData.employees.find(e => e['員工姓名'] === nm);
    if (!emp) {
      out.push({name:nm, action:'NEW', struct:info.struct, bonus:info.bonus, leave:info.leave, campus:campus(nm), month:month(nm)});
    } else {
      const diffs = [];
      for (const k of Object.keys(info.struct)) {
        const old = Number(emp[k]) || 0, nw = Number(info.struct[k]) || 0;
        if (old !== nw) diffs.push(k+': '+old+'→'+nw);
      }
      out.push({name:nm, action: diffs.length ? 'UPDATE' : 'SAME', struct:info.struct, bonus:info.bonus, leave:info.leave, diffs, campus:campus(nm), month:month(nm), eid:emp['員工編號']});
    }
  }
  return out;
}

function preview() {
  if (!cloudData) { setStatus('請先讀取', 'err'); return; }
  const ups = getUpdates();
  let html = '<table><thead><tr><th>姓名</th><th>校區</th><th>狀態</th><th>變動 / 結構</th><th>11504/05 獎金</th><th>請假扣</th></tr></thead><tbody>';
  for (const u of ups) {
    let st = '';
    if (u.action === 'UPDATE') st = '<span class="badge upd">UPD</span> '+(u.diffs.length>3 ? u.diffs.slice(0,3).join('; ')+' ('+u.diffs.length+'項)' : u.diffs.join('; '));
    else if (u.action === 'NEW') st = '<span class="badge new">NEW</span> '+Object.entries(u.struct).map(([k,v])=>k+'='+v).slice(0,4).join('; ');
    else st = '<span class="badge same">同</span>';
    html += `<tr><td><b>${u.name}</b></td><td>${u.campus}</td><td>${u.action}</td><td>${st}</td><td>${u.bonus||'-'}</td><td>${u.leave||'-'}</td></tr>`;
  }
  html += '</tbody></table>';
  setMsg(html);
  document.getElementById('bApply').disabled = false;
  setStatus('預覽完成，請審閱後寫入', 'ok');
}

async function apply() {
  if (!confirm('確定要寫入雲端嗎？這會更新員工結構薪資 + 11504/05 月度獎金/請假扣。')) return;
  if (!cloudData) { setStatus('請先讀取', 'err'); return; }
  const ups = getUpdates();
  // Apply to cloudData
  let nextId = 18;
  for (const u of ups) {
    if (u.action === 'NEW') {
      const prefix = u.campus === '同安' ? 'TA' : 'ZJ';
      const newId = prefix + String(nextId++).padStart(3,'0');
      cloudData.employees.push({
        '員工編號': newId, '員工姓名': u.name, '英文姓名': null,
        '校區': u.campus, '職位': '老師',
        '到職日': new Date().toISOString().substr(0,10),
        '離職日': '', '在職狀態': '在職',
        '底薪': u.struct['底薪']||29500,
        '全勤獎金': u.struct['全勤獎金']||500,
        '年資津貼': u.struct['年資津貼']||0,
        '主管津貼': u.struct['主管津貼']||0,
        '分校人數超額獎金': u.struct['分校人數超額獎金']||0,
        '美語津貼': u.struct['美語津貼']||0,
        '英文輔導津貼': u.struct['英文輔導津貼']||0,
        '數學班津貼': u.struct['數學班津貼']||0,
        '混班/混校津貼': u.struct['混班/混校津貼']||0,
        '帶班人數津貼': u.struct['帶班人數津貼']||0,
        '其他津貼': u.struct['其他津貼']||0,
        '勞保自付': u.struct['勞保自付']||0,
        '健保自付': u.struct['健保自付']||0,
        '退休金提撥': u.struct['退休金提撥']||0,
        '現金給付': 0, '銀行名稱': '', '銀行帳號': '',
        '登入帳號': newId.toLowerCase(), '登入密碼': newId.toLowerCase(), 'Email': ''
      });
      // Add salary record
      cloudData.salary.push({
        '月份': u.month, '員工編號': newId,
        '上班時數': 184, '加班時數': 0, '加班費': 0,
        '請假時數': u.leave ? Math.round(u.leave/180) : 0,
        '請假扣款': u.leave, '遲到次數': 0, '遲到扣款': 0,
        '獎金': u.bonus, '扣款': 0, '特殊調整': 0, '備註': '由Excel匯入'
      });
    } else if (u.action === 'UPDATE') {
      const emp = cloudData.employees.find(e => e['員工姓名'] === u.name);
      Object.assign(emp, u.struct);
      // Update salary[month] bonus + leave
      let sal = cloudData.salary.find(s => s['員工編號'] === emp['員工編號'] && String(s['月份']) === u.month);
      if (!sal) {
        sal = {'月份': u.month, '員工編號': emp['員工編號'], '上班時數': 184, '加班時數': 0, '加班費': 0, '請假時數': 0, '請假扣款': 0, '遲到次數': 0, '遲到扣款': 0, '獎金': 0, '扣款': 0, '特殊調整': 0, '備註': null};
        cloudData.salary.push(sal);
      }
      sal['獎金'] = u.bonus;
      sal['請假扣款'] = u.leave;
      sal['請假時數'] = u.leave ? Math.round(u.leave/180) : 0;
      if (!sal['備註']) sal['備註'] = '由Excel匯入';
    }
  }
  // Push to cloud
  setStatus('寫入中...');
  try {
    const r = await fetch(URL, {
      method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action:'write', data: cloudData})
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error);
    setStatus('✓ 寫入完成 ('+j.ts+')', 'ok');
    setMsg('<p class="ok">✅ 完成！請打開 homepage.html 確認薪資已更新。</p>');
    document.getElementById('bApply').disabled = true;
  } catch (e) {
    setStatus('✗ '+e.message, 'err');
  }
}
</script>
</body>
</html>
