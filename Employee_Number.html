<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kidcastle 薪資查詢 — 員工自助</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📄%3C/text%3E%3C/svg%3E">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:"Microsoft JhengHei","微軟正黑體","PingFang TC",Arial,sans-serif;
  background:linear-gradient(135deg,#10B981 0%,#047857 100%);
  min-height:100vh; color:#1e293b;
}
body.role-employee .ps-row.zero { display:none !important; }
body.role-employee .ps-col.all-zero,
body.role-employee .ps-section-h > div.all-zero,
body.role-employee .ps-subtotal > div.all-zero,
body.role-employee .ps-cash-row.all-zero { display:none !important; }
.wrap { max-width:880px; margin:0 auto; padding:30px 20px; }
header { text-align:center; color:#fff; margin-bottom:24px; }
header h1 { font-size:28px; letter-spacing:1px; text-shadow:0 2px 8px rgba(0,0,0,.2); }
header .sub { font-size:14px; opacity:.9; margin-top:4px; }
.card {
  background:#fff; border-radius:18px; padding:28px;
  box-shadow:0 16px 40px rgba(0,0,0,.2); margin-bottom:18px;
}
.card h2 { color:#065F46; font-size:18px; margin-bottom:14px; border-bottom:2px solid #10B981; padding-bottom:6px; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:5px; }
.field input, .field select {
  width:100%; padding:11px 14px; border:1.5px solid #cbd5e1; border-radius:10px;
  font-size:15px; font-family:inherit; background:#f8fafc;
}
.field input:focus, .field select:focus {
  outline:none; border-color:#10B981; background:#fff;
  box-shadow:0 0 0 3px rgba(16,185,129,.15);
}
.btn {
  display:block; width:100%; padding:13px; border:none; border-radius:10px;
  font-size:16px; font-weight:700; color:#fff;
  background:linear-gradient(135deg,#10B981,#047857);
  cursor:pointer; font-family:inherit;
  box-shadow:0 6px 18px rgba(16,185,129,.3);
}
.btn:hover { transform:translateY(-1px); }
.btn:disabled { opacity:.6; cursor:not-allowed; }
.alert { padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:12px; display:none; }
.alert.show { display:block; }
.alert.error { background:#FEF2F2; color:#991B1B; border-left:3px solid #DC2626; }
.alert.success { background:#F0FDF4; color:#065F46; border-left:3px solid #10B981; }
.back { display:inline-block; margin-bottom:8px; color:#fff; text-decoration:none; font-size:14px; }
.back:hover { text-decoration:underline; }
/* Payslip styling — mirrors homepage.html */
.payslip { background:#fff; border-radius:14px; padding:24px 30px; box-shadow:0 8px 24px rgba(0,0,0,.12); }
.ps-header { text-align:center; border-bottom:3px solid #047857; padding-bottom:10px; margin-bottom:14px; }
.ps-header h2 { font-size:22px; color:#047857; }
.ps-header .sub { font-size:12px; color:#64748b; margin-top:4px; }
.ps-info { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.ps-info .it { background:#f8fafc; padding:9px 12px; border-radius:8px; border-left:3px solid #10B981; }
.ps-info .k { font-size:11px; color:#64748b; }
.ps-info .v { font-size:14px; font-weight:600; }
.ps-section-h { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:6px; }
.ps-section-h > div { text-align:center; padding:8px; background:#10B981; color:#fff; font-weight:700; font-size:13px; border-radius:6px; }
.ps-section-h .deduct { background:#C62828; }
.ps-rows { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
.ps-col { background:#f8fafc; border-radius:6px; padding:8px; }
.ps-col.deduct { background:#FEF2F2; }
.ps-row { display:flex; justify-content:space-between; padding:5px 8px; font-size:13px; border-bottom:1px dashed #e2e8f0; }
.ps-row:last-child { border-bottom:none; }
.ps-row.zero { color:#cbd5e1; }
.ps-row .lbl { color:#475569; }
.ps-row .val { font-family:Arial; font-weight:600; }
.ps-subtotal { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-top:8px; }
.ps-subtotal > div { display:flex; justify-content:space-between; padding:9px 13px; background:#D1FAE5; border-radius:6px; font-weight:700; font-size:14px; }
.ps-subtotal .deduct { background:#FEE2E2; color:#991B1B; }
.ps-subtotal .val { font-family:Arial; }
.ps-cash-row {
  margin-top:8px; padding:9px 13px; background:#FEF3C7; color:#92400E;
  border-radius:6px; border-left:4px solid #F59E0B;
  display:flex; justify-content:space-between; align-items:center; font-weight:700; font-size:14px;
}
.ps-cash-row .val { font-family:Arial; font-size:15px; }
.ps-net {
  margin-top:12px; padding:16px 22px;
  background:linear-gradient(135deg,#34D399,#10B981);
  color:#fff; border-radius:12px;
  display:flex; justify-content:space-between; align-items:center;
  box-shadow:0 8px 22px rgba(16,185,129,.3); flex-wrap:wrap; gap:10px;
}
.ps-net .lbl { font-size:15px; font-weight:600; }
.ps-net .val { font-size:28px; font-weight:800; font-family:Arial; }
.toolbar { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.toolbar select { flex:1; padding:8px 12px; border:1.5px solid #cbd5e1; border-radius:8px; font-size:13px; font-family:inherit; background:#f8fafc; }
.toolbar button { padding:8px 14px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
.toolbar button.print { background:#1e293b; color:#fff; }
.toolbar button.logout { background:#fee2e2; color:#991B1B; }
.loading { text-align:center; padding:30px; color:#64748b; }
.loading .spin { width:36px; height:36px; border:4px solid #d1fae5; border-top-color:#10B981; border-radius:50%; animation:sp 1s linear infinite; margin:0 auto 10px; }
@keyframes sp { to { transform:rotate(360deg); } }
@media print {
  body { background:#fff !important; }
  .no-print { display:none !important; }
  .card { box-shadow:none; }
  .payslip { box-shadow:none; padding:0; }
  @page { size:A4 portrait; margin:8mm; }
}
</style>
</head>
<body class="role-employee">
<div class="wrap">
  <header>
    <a href="homepage.html" class="back no-print">← 返回首頁</a>
    <h1>🏰 Kidcastle 員工薪資查詢</h1>
    <div class="sub">Employee Self-Service · Payslip Lookup</div>
  </header>

  <!-- Login form -->
  <div class="card no-print" id="loginCard">
    <h2>🔐 員工登入</h2>
    <p style="font-size:13px;color:#64748b;margin-bottom:14px;">請輸入您的員工編號與密碼，僅能查詢自己的薪資資料。</p>
    <div class="alert error" id="errMsg">⚠ <span id="errText"></span></div>
    <div class="field">
      <label>員工編號 Employee ID</label>
      <input type="text" id="empId" placeholder="例如：TA001 / ZJ005" autocomplete="username" autocapitalize="characters">
    </div>
    <div class="field">
      <label>登入密碼 Password</label>
      <input type="password" id="empPwd" placeholder="預設為員工編號（小寫）" autocomplete="current-password">
    </div>
    <button class="btn" id="btnLogin" onclick="doLogin()">🔍 查詢薪資</button>
    <p style="margin-top:12px;font-size:12px;color:#94a3b8;">忘記密碼？請聯絡學校老闆協助重置。</p>
  </div>

  <!-- Loading state -->
  <div class="card no-print" id="loadingCard" style="display:none;">
    <div class="loading">
      <div class="spin"></div>
      <div>正在從雲端讀取薪資資料…</div>
    </div>
  </div>

  <!-- Payslip view -->
  <div id="payslipCard" style="display:none;">
    <div class="card no-print">
      <div class="toolbar">
        <select id="monthSel" onchange="renderPayslip()"></select>
        <button class="print" onclick="window.print()">🖨 列印 / 存PDF</button>
        <button class="logout" onclick="doLogout()">登出</button>
      </div>
    </div>
    <div class="payslip" id="payslip"></div>
  </div>
</div>

<script>
const CLOUD_URL = 'https://script.google.com/macros/s/AKfycbyQpJuII2RkmYQ-3P33XMt_Vv8Fd9eAV8KmwnHiTOQiXZuL3E9yvIBBiMRNgxEBKpU/exec';
let DATA = null;
let currentEmp = null;
const $ = id => document.getElementById(id);

function showErr(msg) {
  $('errText').textContent = msg;
  $('errMsg').classList.add('show');
}
function hideErr() { $('errMsg').classList.remove('show'); }

async function cloudGet(action) {
  const url = CLOUD_URL + '?action=' + encodeURIComponent(action) + '&_=' + Date.now();
  const r = await fetch(url, { method:'GET', cache:'no-store' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const j = await r.json();
  if (!j.ok) throw new Error(j.error || '雲端錯誤');
  return j;
}

async function doLogin() {
  const eid = ($('empId').value || '').trim().toUpperCase();
  const pwd = ($('empPwd').value || '').trim();
  if (!eid) { showErr('請輸入員工編號'); $('empId').focus(); return; }
  if (!pwd) { showErr('請輸入密碼'); $('empPwd').focus(); return; }
  hideErr();
  $('btnLogin').disabled = true;
  $('btnLogin').textContent = '驗證中…';
  $('loginCard').style.display = 'none';
  $('loadingCard').style.display = 'block';
  try {
    const j = await cloudGet('read');
    DATA = j.data || {};
    const emp = (DATA.employees || []).find(e =>
      String(e['員工編號'] || '').toUpperCase() === eid
    );
    if (!emp) throw new Error('找不到此員工編號');
    if (emp['在職狀態'] !== '在職') throw new Error('此員工目前非在職狀態，如需查詢請聯絡老闆');
    const stored = String(emp['登入密碼'] || '');
    if (pwd !== stored && pwd.toLowerCase() !== stored.toLowerCase()) {
      throw new Error('密碼錯誤');
    }
    currentEmp = emp;
    populateMonth();
    $('loadingCard').style.display = 'none';
    $('payslipCard').style.display = 'block';
    renderPayslip();
  } catch (e) {
    $('loadingCard').style.display = 'none';
    $('loginCard').style.display = 'block';
    $('btnLogin').disabled = false;
    $('btnLogin').textContent = '🔍 查詢薪資';
    showErr(e.message);
  }
}

function doLogout() {
  currentEmp = null;
  DATA = null;
  $('payslipCard').style.display = 'none';
  $('loginCard').style.display = 'block';
  $('empPwd').value = '';
  $('btnLogin').disabled = false;
  $('btnLogin').textContent = '🔍 查詢薪資';
  hideErr();
}

function populateMonth() {
  const myEid = currentEmp['員工編號'];
  const months = [...new Set((DATA.salary || [])
    .filter(s => s['員工編號'] === myEid)
    .map(s => String(s['月份'])))].sort().reverse();
  const sel = $('monthSel');
  if (!months.length) {
    sel.innerHTML = '<option>—</option>';
  } else {
    sel.innerHTML = months.map(m => `<option value="${m}">${m} (民國${m.slice(0,3)}年${m.slice(3,5)}月)</option>`).join('');
  }
}

function fmtNT(n) { return (Number(n)||0).toLocaleString('en-US'); }

function findSalary(eid, month) {
  return (DATA.salary || []).find(s => s['員工編號'] === eid && String(s['月份']) === String(month));
}

function renderPayslip() {
  const emp = currentEmp;
  const month = $('monthSel').value;
  const sal = findSalary(emp['員工編號'], month) || {};
  const noLL = (Number(sal['請假時數'])||0)===0 && (Number(sal['遲到次數'])||0)===0;
  const attBonus = noLL ? (Number(emp['全勤獎金'])||0) : 0;
  // OT pay
  const base = Number(emp['底薪'])||0, hourly = base/240;
  const otH = Number(sal['加班時數'])||0;
  const otPay = Math.round(otH * hourly * 1.34);
  const leaveH = Number(sal['請假時數'])||0;
  const leaveD = Math.round(leaveH * 180);
  const lateCnt = Number(sal['遲到次數'])||0;
  const lateD = lateCnt * 100;

  const fixed = [
    ['底薪 Base', emp['底薪']],
    ['全勤獎金 Attendance', attBonus],
    ['年資津貼 Seniority', emp['年資津貼']],
    ['主管津貼 Manager', emp['主管津貼']],
    ['分校人數超額獎金 Excess', emp['分校人數超額獎金']],
    ['美語津貼 English', emp['美語津貼']],
    ['英文輔導津貼 Tutoring', emp['英文輔導津貼']],
    ['數學班津貼 Math', emp['數學班津貼']],
    ['混班/混校津貼 Mixed', emp['混班/混校津貼']],
    ['帶班人數津貼 Class', emp['帶班人數津貼']],
    ['其他津貼 Others', emp['其他津貼']]
  ];
  const subA = fixed.reduce((s,[,v])=>s+(Number(v)||0), 0);

  const variable = [
    ['加班費 OT Pay', otPay],
    ['獎金 Bonus', sal['獎金']],
    ['特殊調整 Adjust', sal['特殊調整']]
  ];
  const subB = variable.reduce((s,[,v])=>s+(Number(v)||0), 0);

  const deductions = [
    ['勞保自付 Labor Ins', emp['勞保自付']],
    ['健保自付 Health Ins', emp['健保自付']],
    ['請假時數 Leave Hours', leaveH],
    ['請假扣款 Leave Deduct', leaveD],
    ['遲到扣款 Late', lateD],
    ['扣款 Deduction', sal['扣款']]
  ];
  const subC = deductions.filter(([k])=>!k.startsWith('請假時數'))
    .reduce((s,[,v])=>s+(Number(v)||0), 0);
  const subD = Number(emp['現金給付'])||0;
  const net = subA + subB - subC - subD;
  const today = new Date().toISOString().substr(0,10);

  const renderRows = items => items.map(([k,v]) => {
    const num = Number(v)||0;
    return `<div class="ps-row${num===0?' zero':''}"><span class="lbl">${k}</span><span class="val">${fmtNT(num)}</span></div>`;
  }).join('');

  const isFixedZero = fixed.every(([,v])=>(Number(v)||0)===0);
  const isVarZero   = variable.every(([,v])=>(Number(v)||0)===0);
  const isDedZero   = deductions.every(([,v])=>(Number(v)||0)===0);
  const cashClass   = subD===0 ? ' all-zero' : '';

  $('payslip').innerHTML = `
    <div class="ps-header">
      <h2>Kidcastle ${emp['校區']}校區 — 薪資條</h2>
      <div class="sub">Salary Payslip · ${month} (民國${month.slice(0,3)}年${month.slice(3,5)}月) · 查詢日期 ${today}</div>
    </div>
    <div class="ps-info">
      <div class="it"><div class="k">員工姓名</div><div class="v">${emp['員工姓名']||''}${emp['英文姓名']?' ('+emp['英文姓名']+')':''}</div></div>
      <div class="it"><div class="k">員工編號</div><div class="v">${emp['員工編號']}</div></div>
      <div class="it"><div class="k">職位</div><div class="v">${emp['職位']||'—'}</div></div>
      <div class="it"><div class="k">校區</div><div class="v">${emp['校區']}</div></div>
      <div class="it"><div class="k">到職日</div><div class="v">${emp['到職日']||'-'}</div></div>
      <div class="it"><div class="k">在職狀態</div><div class="v">${emp['在職狀態']}</div></div>
    </div>
    <div class="ps-section-h">
      <div class="${isFixedZero?'all-zero':''}">① 約定薪資結構 Fixed</div>
      <div class="${isVarZero?'all-zero':''}">② 非固定支付 Variable</div>
      <div class="deduct ${isDedZero?'all-zero':''}">③ 應代扣項目 Deductions</div>
    </div>
    <div class="ps-rows">
      <div class="ps-col${isFixedZero?' all-zero':''}">${renderRows(fixed)}</div>
      <div class="ps-col${isVarZero?' all-zero':''}">${renderRows(variable)}</div>
      <div class="ps-col deduct${isDedZero?' all-zero':''}">${renderRows(deductions)}</div>
    </div>
    <div class="ps-subtotal">
      <div class="${isFixedZero?'all-zero':''}"><span>小計 (A)</span><span class="val">${fmtNT(subA)}</span></div>
      <div class="${isVarZero?'all-zero':''}"><span>小計 (B)</span><span class="val">${fmtNT(subB)}</span></div>
      <div class="deduct ${isDedZero?'all-zero':''}"><span>小計 (C)</span><span class="val">${fmtNT(subC)}</span></div>
    </div>
    <div class="ps-cash-row${cashClass}">
      <div class="lbl">小計 (D) · 現金給付 Cash Payment</div>
      <div class="val">NT$ ${fmtNT(subD)}</div>
    </div>
    <div class="ps-net">
      <div class="lbl">實領金額 Net Salary</div>
      <div class="val">NT$ ${fmtNT(net)}</div>
    </div>
  `;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (document.activeElement.id === 'empId' || document.activeElement.id === 'empPwd')) {
    e.preventDefault();
    doLogin();
  }
});
</script>
</body>
</html>
